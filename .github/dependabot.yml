---
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(actions)"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(maven)"
    labels:
      - "dependencies"
      - "maven"
    groups:
      # Majors stay ungrouped (one PR each) so they get individual review;
      # minor/patch bumps are low-risk and get bundled to cut PR noise.
      maven-minor-patch:
        update-types:
          - "minor"
          - "patch"
